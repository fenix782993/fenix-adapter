<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOENIX ADAPTER | SECURE HUB</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для кастомного курсора-прицела */
        body {
            cursor: none;
        }
        a, button {
            cursor: none;
        }
        #custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #00ff66;
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s linear;
        }
        #custom-cursor::before, #custom-cursor::after {
            content: '';
            position: absolute;
            background: #00ff66;
        }
        #custom-cursor::before {
            top: 50%; left: -5px; width: 30px; height: 2px; transform: translateY(-50%);
        }
        #custom-cursor::after {
            left: 50%; top: -5px; height: 30px; width: 2px; transform: translateX(-50%);
        }
        .cyber-btn:hover ~ #custom-cursor, button:hover ~ #custom-cursor, .modal-input:hover ~ #custom-cursor {
            transform: translate(-50%, -50%) scale(1.3);
            border-color: #ff0055;
        }

        /* Эффект глитча для баннера при наведении */
        .banner-container {
            overflow: hidden;
            position: relative;
        }
        .main-banner:hover {
            animation: imgGlitch 0.3s infinite;
            filter: hue-rotate(90deg);
        }
        @keyframes imgGlitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); skewX(5deg); }
            40% { transform: translate(3px, -1px); skewX(-5deg); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 1px); }
            100% { transform: translate(0); }
        }

        /* --- СТИЛИ ДЛЯ ЭКВАЛАЙЗЕРА --- */
        .audio-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 1px solid #00ff66;
            border-radius: 5px;
        }
        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            width: 40px;
            height: 25px;
        }
        .equalizer .bar {
            width: 4px;
            height: 100%;
            background-color: #00ff66;
            transform-origin: bottom;
            transform: scaleY(0.1);
        }
        .equalizer.playing .bar {
            animation: bounce 0.8s ease infinite alternate;
        }
        .equalizer.playing .bar:nth-child(2) { animation-delay: 0.2s; animation-duration: 0.6s; }
        .equalizer.playing .bar:nth-child(3) { animation-delay: 0.4s; animation-duration: 0.9s; }
        .equalizer.playing .bar:nth-child(4) { animation-delay: 0.1s; animation-duration: 0.7s; }
        .equalizer.playing .bar:nth-child(5) { animation-delay: 0.3s; animation-duration: 0.5s; }

        @keyframes bounce {
            0% { transform: scaleY(0.1); }
            100% { transform: scaleY(1); }
        }

        /* --- СЕТКА ДЛЯ КОМПЬЮТЕРОВ (ПК) --- */
        .links-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 18px;
            margin-bottom: 40px;
        }

        .btn-tg-channel { grid-column: span 3; }
        .btn-community-chat { grid-column: span 3; }
        .btn-get-vpn {
            grid-column: span 6; 
            font-size: 20px !important;
            padding: 26px 15px !important;
            letter-spacing: 4px !important;
        }
        .btn-buy-stars { grid-column: span 2; }
        .btn-contact-admin { grid-column: span 4; }
        .btn-like-adapter {
            grid-column: span 6; 
            padding: 22px 15px !important;
        }

        /* --- КРАСИВАЯ СЕТКА ДЛЯ ТЕЛЕФОНОВ (МОБИЛКИ) --- */
        @media (max-width: 600px) {
            .links-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 0 5px;
            }
            .btn-tg-channel { grid-column: span 1; font-size: 13px !important;}
            .btn-community-chat { grid-column: span 1; font-size: 13px !important;}
            .btn-get-vpn { 
                grid-column: span 2; 
                font-size: 18px !important;
                padding: 22px 10px !important;
            }
            .btn-buy-stars { grid-column: span 1; font-size: 13px !important;}
            .btn-contact-admin { grid-column: span 1; font-size: 13px !important;}
            .btn-like-adapter { 
                grid-column: span 2; 
                padding: 18px 10px !important;
            }
        }

        /* --- ХАКЕРСКОЕ МОДАЛЬНОЕ ОКНО ДЛЯ ВВОДА НИКА --- */
        #custom-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #custom-modal.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background: rgba(0, 15, 5, 0.95);
            border: 2px solid #ff0055;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.4);
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            color: #ff0055;
        }
        .modal-title {
            font-size: 1.2em;
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .modal-input {
            width: 100%;
            background: #000;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 12px;
            font-size: 16px;
            font-family: monospace;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .modal-input:focus {
            border-color: #ff0055;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .modal-btn {
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .modal-btn:hover {
            background: #ff0055;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
        }
        .modal-btn.confirm {
            border-color: #00ff66;
            color: #00ff66;
        }
        .modal-btn.confirm:hover {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.6);
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <audio id="bg-music" loop src="Noggano_-_Santa_Mujerte_75208053.mp3" preload="auto"></audio>

    <div id="preloader">
        <div class="loader-terminal">
            <div id="log-container"></div>
            <button id="start-btn" style="display: none;" class="cyber-btn">INITIALIZE SYSTEM (WITH AUDIO)</button>
        </div>
    </div>

    <canvas id="matrix"></canvas>

    <div class="container main-content" id="main-content">
        
        <div class="audio-container">
            <div class="equalizer" id="equalizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <button id="mute-toggle" class="mute-btn">🔊 AUDIO ON</button>
        </div>

        <header class="banner-container">
            <img src="banner.png" alt="Phoenix Adapter Banner" class="main-banner">
        </header>

        <div class="terminal-status">
            <span class="blink"> > </span> 
            <span id="typewriter"></span><span class="cursor">_</span>
            <div id="live-counter" style="margin-top: 5px; color: #00ff66; font-size: 0.9em; opacity: 0.8;">
                PING: <span id="ping-val">0</span>ms | PACKETS_SHREDDED: <span id="packets-val">0</span>
            </div>
        </div>

        <main class="links-grid">
            <a href="https://t.me/qfenixqa" target="_blank" class="cyber-btn btn-tg-channel" data-scramble="ТГ КАНАЛ">
                <span class="btn-text">ТГ КАНАЛ</span>
                <span class="btn-glitch">TG_CHANNEL</span>
            </a>

            <a href="https://t.me/+-x9fbyWpSj85NmFl" target="_blank" class="cyber-btn btn-community-chat" data-scramble="НАШ ЧАТ">
                <span class="btn-text">НАШ ЧАТ</span>
                <span class="btn-glitch">COMMUNITY_CHAT</span>
            </a>

            <a href="https://t.me/fenixVPNrobot" target="_blank" class="cyber-btn special btn-get-vpn" data-scramble="КУПИТЬ VPN">
                <span class="btn-text">КУПИТЬ VPN</span>
                <span class="btn-glitch">GET_VPN</span>
            </a>

            <a href="https://t.me/Fenix_stars_bot" target="_blank" class="cyber-btn btn-buy-stars" data-scramble="КУПИТЬ ЗВЕЗДЫ">
                <span class="btn-text">КУПИТЬ ЗВЕЗДЫ</span>
                <span class="btn-glitch">BUY_STARS</span>
            </a>

            <a href="https://t.me/webFenix" target="_blank" class="cyber-btn btn-contact-admin" data-scramble="ЧАТ СО МНОЙ">
                <span class="btn-text">ЧАТ СО МНОЙ</span>
                <span class="btn-glitch">CONTACT_ADMIN</span>
            </a>

            <button id="like-trigger-btn" class="cyber-btn love-btn btn-like-adapter" data-scramble="ПОСТАВИТЬ ❤️">
                <span class="btn-text">ПОСТАВИТЬ ❤️</span>
                <span class="btn-glitch">LIKE_ADAPTER</span>
            </button>
        </main>

        <footer>
            <p>© 2026 PHOENIX ADAPTER. LOAD_COMPLETE. SYSTEM: ACCESS GRANTED.</p>
        </footer>
    </div>

    <div id="custom-modal">
        <div class="modal-box">
            <div class="modal-title">[⚠️] ENTER YOUR REBEL_ID / NICKNAME:</div>
            <input type="text" id="rebel-name-input" class="modal-input" placeholder="Введите ваш ник..." maxlength="25">
            <div class="modal-buttons">
                <button id="modal-cancel" class="modal-btn">ABORT</button>
                <button id="modal-submit" class="modal-btn confirm">SUBMIT_HEART</button>
            </div>
        </div>
    </div>

    <script>
        // --- ЛОГИКА ДВИЖЕНИЯ КУРСОРА ---
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // --- ЖИВОЙ СЧЕТЧИК ОНЛАЙНА / ПИНГА ---
        let packetsCount = 1423;
        const pingVal = document.getElementById('ping-val');
        const packetsVal = document.getElementById('packets-val');

        function updateLiveStats() {
            pingVal.textContent = Math.floor(Math.random() * (45 - 20 + 1)) + 20;
            packetsCount += Math.floor(Math.random() * 4) + 1;
            packetsVal.textContent = packetsCount;
            setTimeout(updateLiveStats, Math.random() * 600 + 400);
        }
        updateLiveStats();

        // --- ЭФФЕКТ ХАКЕРСКОЙ РАСШИФРОВКИ НА КНОПКАХ ---
        const charsList = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZｱｲｳｴｵｶｷｸｹｺ%@#$';
        
        document.querySelectorAll('.cyber-btn').forEach(btn => {
            const textNode = btn.querySelector('.btn-text');
            const originalText = btn.getAttribute('data-scramble');
            let interval = null;

            btn.addEventListener('mouseenter', () => {
                let iteration = 0;
                clearInterval(interval);
                
                interval = setInterval(() => {
                    textNode.innerText = originalText
                        .split("")
                        .map((letter, index) => {
                            if(index < iteration) {
                                return originalText[index];
                            }
                            return charsList[Math.floor(Math.random() * charsList.length)];
                        })
                        .join("");
                    
                    if(iteration >= originalText.length) {
                        clearInterval(interval);
                    }
                    iteration += 1 / 3;
                }, 30);
            });

            btn.addEventListener('mouseleave', () => {
                clearInterval(interval);
                textNode.innerText = originalText;
            });
        });

        // --- ИНТЕРАКТИВНАЯ МОДАЛКА ЛАЙКА И ГЕНЕРАЦИЯ ССЫЛКИ ---
        const likeBtn = document.getElementById('like-trigger-btn');
        const modal = document.getElementById('custom-modal');
        const modalCancel = document.getElementById('modal-cancel');
        const modalSubmit = document.getElementById('modal-submit');
        const nameInput = document.getElementById('rebel-name-input');

        likeBtn.addEventListener('click', () => {
            nameInput.value = '';
            modal.classList.add('open');
        });

        modalCancel.addEventListener('click', () => {
            modal.classList.remove('open');
            playBeep(400, 0.1);
        });

        modalSubmit.addEventListener('click', () => {
            let nickname = nameInput.value.trim();
            if (!nickname) nickname = "ANONYMOUS_REBEL";

            // Новый стилизованный хакерский рапорт-сообщение
            const messageText = `🛰 [PHOENIX HUB REPORT] 🛰\n` +
                                `========================\n` +
                                `• AGENT_ID: ${nickname}\n` +
                                `• SYSTEM: PHOENIX ADAPTER v4.2\n` +
                                `• STATUS: EXTREMELY_HIGH_QUALITY 🔥\n` +
                                `========================\n` +
                                `Админ, хаб получился лютейший! Сетка огонь, трек залетает на ура, визуальные глитчи — чистый перверт. Максимальный респект за работу, закидываю тебя лайками! ❤️🛸\n` +
                                `========================\n` +
                                `> ENCRYPTION: SECURE_LINK_PASS_✅`;

            const encodedText = encodeURIComponent(messageText);
            const telegramUrl = `https://t.me/webFenix?text=${encodedText}`;
            
            modal.classList.remove('open');
            playBeep(1100, 0.15);
            
            // Открываем сгенерированную ссылку в новом окне
            window.open(telegramUrl, '_blank');
        });

        // --- ФЕЙКОВЫЙ ЛОГ ЗАГРУЗКИ ---
        const logs = [
            "[CORE] LOADING PHOENIX OS v4.2...",
            "[NET] CONNECTING TO SECURE VPN NODES...",
            "[BYPASS] EXPLOITING FIREWALL PROTOCOLS...",
            "[DECRYPT] DECRYPTING ENCRYPTED ASSETS...",
            "[STATUS] BYPASS COMPLETED SUCCESSFULLY.",
            "[SUCCESS] PHOENIX ADAPTER REBOOTED.",
            "READY FOR ACCESS..."
        ];
        
        const logContainer = document.getElementById("log-container");
        const startBtn = document.getElementById("start-btn");
        let logIndex = 0;

        function playBeep(freq = 440, duration = 0.05) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function showLogs() {
            if (logIndex < logs.length) {
                const p = document.createElement("p");
                p.textContent = logs[logIndex];
                logContainer.appendChild(p);
                playBeep(600, 0.03);
                logIndex++;
                setTimeout(showLogs, 400);
            } else {
                startBtn.style.display = "block";
            }
        }
        window.addEventListener("load", showLogs);

        // --- ВХОД НА САЙТ, ВЫЗОВ ЭКВАЛАЙЗЕРА И ВКЛЮЧЕНИЕ МУЗЫКИ ---
        const bgMusic = document.getElementById("bg-music");
        const preloader = document.getElementById("preloader");
        const mainContent = document.getElementById("main-content");
        const muteToggle = document.getElementById("mute-toggle");
        const equalizer = document.getElementById("equalizer");

        startBtn.addEventListener("click", () => {
            preloader.style.opacity = "0";
            setTimeout(() => {
                preloader.style.display = "none";
                mainContent.classList.add("active");
                bgMusic.volume = 0.25; 
                bgMusic.play()
                    .then(() => equalizer.classList.add('playing'))
                    .catch(() => console.log("Audio blocked"));
                startTypewriter();
            }, 500);
        });

        muteToggle.addEventListener("click", () => {
            if (bgMusic.paused) {
                bgMusic.play();
                equalizer.classList.add('playing');
                muteToggle.textContent = "🔊 AUDIO ON";
            } else {
                bgMusic.pause();
                equalizer.classList.remove('playing');
                muteToggle.textContent = "🔇 MUTED";
            }
            playBeep(800, 0.05);
        });

        document.querySelectorAll(".cyber-btn, button").forEach(btn => {
            btn.addEventListener("mouseenter", () => playBeep(500, 0.02));
            btn.addEventListener("click", () => playBeep(900, 0.08));
        });

        // --- ЭФФЕКТ ПЕЧАТНОЙ МАШИНКИ ---
        const textToType = "SYSTEM_STATUS: ONLINE | SECURE_CONNECTION: ESTABLISHED | BYPASS_ACTIVE";
        let typeIndex = 0;
        function startTypewriter() {
            if (typeIndex < textToType.length) {
                document.getElementById("typewriter").textContent += textToType.charAt(typeIndex);
                if(Math.random() > 0.3) playBeep(700, 0.01); 
                typeIndex++;
                setTimeout(startTypewriter, 40);
            }
        }

        // --- ЭФФЕКТ МАТРИЦЫ НА ФОНЕ ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZｱｲｳｴｵｶｷｸｹｺ';
        const alphabet = chars.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = [];
        for(let x = 0; x < columns; x++) {
            rainDrops[x] = Math.random() * -100;
        }
        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff66';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                if (Math.random() > 0.98) ctx.fillStyle = '#fff';
                else ctx.fillStyle = '#00ff66';
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        };
        setInterval(draw, 33);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
